<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brinson — Portfolio Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  html, body { margin: 0; min-height: 100%; background: #e9ecf1; }
  #stage { width: 100%; min-height: 100vh; }
  #err { display:none; max-width:560px; margin:18vh auto; font:14px/1.6 system-ui,sans-serif; color:#36404f;
         background:#fff; border:1px solid #e4e8ee; border-radius:12px; padding:20px 24px; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="err"><b>Couldn't load data.json.</b><br>
This page must be served over HTTP (GitHub Pages, or <code>python3 -m http.server</code> in this
directory) — browsers block <code>fetch</code> from <code>file://</code>.</div>

<script src="dashboard.js"></script>
<script>
"use strict";
// Production bootstrap: bake the design settings chosen in Claude Design
// (studio variant, green accent, hero KPI layout) and feed the real data.
//
// Data source resolution, first success wins:
//   1. ?api=<backend base url>   e.g. ?api=https://brinson.up.railway.app
//      (a url ending in /api/data or .json is treated as a full-document fetch)
//   2. same-origin live backend  /api/market + /api/portfolios in parallel, then
//      per-portfolio detail on selection; the weights matrix arrives after first
//      paint and the chart fills in
//   3. data.json                 baked static file (GitHub Pages) — everything at once
var INITIAL_PF = 6; // Portfolio 007, the README's example
var dash = null;
var override = (new URLSearchParams(location.search).get("api") || "").replace(/\/+$/, "");

function getJson(u) {
  return fetch(u).then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); });
}

function splitMode(base) {
  var pre = base ? base + "/" : "";
  return Promise.all([getJson(pre + "api/market"), getJson(pre + "api/portfolios")])
    .then(function (r) {
      var D = r[0];
      D.portfolios = r[1];
      D.__loadPf = function (i) {
        var cur = D.portfolios[i];
        if (cur.rp) return Promise.resolve();
        return getJson(pre + "api/portfolio/" + cur.id).then(function (core) {
          D.portfolios[i] = core;
          // Weights feed one below-the-fold chart and are 60% of the bytes:
          // fetch after the portfolio renders, then refresh in place.
          getJson(pre + "api/portfolio/" + core.id + "/weights").then(function (w) {
            D.portfolios[i].weights = w.weights;
            if (dash) dash.update({});
          });
        });
      };
      return D.__loadPf(INITIAL_PF).then(function () { return D; });
    });
}

var attempt;
if (override) {
  attempt = /api\/data$|\.json$/.test(override) ? getJson(override) : splitMode(override);
} else {
  attempt = splitMode("").catch(function () { return getJson("data.json"); });
}

attempt
  .then(function (d) {
    window.BRINSON_DATA = d;
    dash = window.BrinsonDashboard(document.getElementById("stage"), {
      variant: "studio",
      theme: "dark",
      tweakable: false,
      fit: false,            // scrolling page; enables expand-to-modal panels
      pf: 6,                 // Portfolio 007, the README's example
      heroKey: "twr",
      layout: "hero",
      density: "compact",
      radius: 8,
      cardStyle: "shadow",
      accent: "#3fa06a",
      lineWeight: 3,
      areaFill: true,
      gridLines: "full",
      ensurePortfolio: d.__loadPf || null
    });
  })
  .catch(function () { document.getElementById("err").style.display = "block"; });
</script>
</body>
</html>
